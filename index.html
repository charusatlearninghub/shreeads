<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SHREE ADS</title>
    <meta name="description" content="SHREE ADS - Digital marketing courses and tools to grow your skills and business." />
    <meta name="author" content="SHREE ADS" />

    <link rel="icon" type="image/png" href="/favicon.png" />

    <meta property="og:title" content="SHREE ADS" />
    <meta property="og:description" content="Your trusted learning platform for professional courses and skill development" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ShreeAdsMall" />
    <meta name="twitter:image" content="/favicon.png" />
  </head>

  <body>
    <script>
      // Apply saved theme to <html> before paint to avoid flash
      (function(){var t=localStorage.getItem('theme');if(t==='dark')document.documentElement.classList.add('dark');})();
    </script>
    <div id="root">
      <div id="app-loader">
        <img alt="Loading" class="loader-logo" />
        <div class="loader-spinner"></div>
      </div>
    </div>
    <style>
      #app-loader{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:hsl(220 20% 98%);z-index:9999;transition:opacity .4s ease,visibility .4s ease;}
      #app-loader.fade-out{opacity:0;visibility:hidden;}
      .loader-logo{height:48px;margin-bottom:24px;animation:loaderPulse 1.8s ease-in-out infinite;}
      .loader-spinner{width:40px;height:40px;border:3px solid hsl(220 13% 91%);border-top-color:hsl(239 84% 67%);border-radius:50%;animation:loaderSpin .7s linear infinite;}
      .dark #app-loader{background:hsl(222 47% 6%);}
      .dark .loader-spinner{border-color:hsl(222 47% 18%);border-top-color:hsl(239 84% 67%);}
      .dark .loader-logo{filter:brightness(1.3) drop-shadow(0 0 8px rgba(255,255,255,0.2));}
      @keyframes loaderSpin{to{transform:rotate(360deg)}}
      @keyframes loaderPulse{0%,100%{opacity:.6;transform:scale(.95)}50%{opacity:1;transform:scale(1)}}
    </style>
    <script type="module">
      import logoUrl from "/src/assets/new-logo.png";
      const img = document.querySelector("#app-loader img.loader-logo");
      if (img) img.setAttribute("src", logoUrl);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
